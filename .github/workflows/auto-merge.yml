name: Auto Merge Ready PRs

permissions:
  contents: write
  pull-requests: write
  checks: read

on:
  schedule:
    # Run every 2 hours
    - cron: '0 */2 * * *'
  workflow_dispatch:

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    outputs:
      merged_count: ${{ steps.merge-prs.outputs.merged_count }}
      classic_challenges: ${{ steps.merge-prs.outputs.classic_challenges }}
      package_challenges: ${{ steps.merge-prs.outputs.package_challenges }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Auto-merge eligible PRs
        id: merge-prs
        uses: actions/github-script@v7
        with:
          script: |
            const TWO_DAYS_MS = 12 * 60 * 60 * 1000;
            const MAX_MERGES_PER_RUN = 10;
            const now = new Date();
            let mergeCount = 0;
            const classicChallenges = new Set();
            const packageChallenges = new Set();
            
            // Get all open PRs targeting main
            const { data: prs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              base: 'main',
              per_page: 100
            });
            
            for (const pr of prs) {
              // Check if we've reached the merge limit
              if (mergeCount >= MAX_MERGES_PER_RUN) {
                console.log(`Reached maximum of ${MAX_MERGES_PER_RUN} merges per run. Stopping.`);
                break;
              }
              
              const labels = pr.labels.map(l => l.name);
              
              // Skip if marked as do-not-merge
              if (labels.includes('do-not-merge')) {
                console.log(`PR #${pr.number}: Skipping - has 'do-not-merge' label`);
                continue;
              }
              
              // Get the pr-status check result
              const { data: checks } = await github.rest.checks.listForRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: pr.head.sha
              });
              
              const prStatusCheck = checks.check_runs.find(c => c.name === 'pr-status');
              
              // Skip if pr-status check hasn't run or didn't succeed
              if (!prStatusCheck) {
                console.log(`PR #${pr.number}: Skipping - no pr-status check found`);
                continue;
              }
              
              if (prStatusCheck.conclusion !== 'success') {
                console.log(`PR #${pr.number}: Skipping - pr-status check is '${prStatusCheck.conclusion}'`);
                continue;
              }
              
              // Use the pr-status check completion time for the 2-day wait
              const checkCompletedAt = new Date(prStatusCheck.completed_at);
              const timeSinceCheck = now - checkCompletedAt;
              
              if (timeSinceCheck < TWO_DAYS_MS) {
                const hoursRemaining = Math.ceil((TWO_DAYS_MS - timeSinceCheck) / (60 * 60 * 1000));
                const hoursSinceCheck = Math.floor(timeSinceCheck / (60 * 60 * 1000));
                console.log(`PR #${pr.number}: Skipping - pr-status passed ${hoursSinceCheck} hours ago, needs ${hoursRemaining} more hours`);
                continue;
              }
              
              // Check if PR is mergeable
              let prDetails = (await github.rest.pulls.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pr.number
              })).data;
              
              // If state is unknown, wait and retry
              if (prDetails.mergeable_state === 'unknown' || prDetails.mergeable === null) {
                console.log(`PR #${pr.number}: Waiting for GitHub to compute merge status...`);
                await new Promise(resolve => setTimeout(resolve, 5000));
                
                prDetails = (await github.rest.pulls.get({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: pr.number
                })).data;
              }
              
              if (prDetails.mergeable_state !== 'clean' && prDetails.mergeable_state !== 'unstable') {
                console.log(`PR #${pr.number}: Skipping - mergeable_state is '${prDetails.mergeable_state}'`);
                continue;
              }
              
              // All conditions met - merge the PR
              const hoursSinceCheck = Math.floor(timeSinceCheck / (60 * 60 * 1000));
              console.log(`PR #${pr.number}: Merging - pr-status passed ${hoursSinceCheck} hours ago`);
              
              try {
                // Get PR files before merging to track which challenges were modified
                const { data: files } = await github.rest.pulls.listFiles({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: pr.number
                });
                
                // Track modified challenges
                for (const file of files) {
                  const classicMatch = file.filename.match(/^(challenge-\d+)\/submissions\//);
                  if (classicMatch) {
                    classicChallenges.add(classicMatch[1]);
                  }
                  
                  const packageMatch = file.filename.match(/^(packages\/[^/]+\/challenge-[^/]+)\/submissions\//);
                  if (packageMatch) {
                    packageChallenges.add(packageMatch[1]);
                  }
                }
                
                await github.rest.pulls.merge({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: pr.number,
                  merge_method: 'squash',
                  commit_title: `${pr.title} (#${pr.number})`,
                  commit_message: `Auto-merged after 2 days with all checks passing.\n\nPR: #${pr.number}\nAuthor: @${pr.user.login}`
                });
                
                console.log(`PR #${pr.number}: Successfully merged!`);
                mergeCount++;
                
                // Add a comment
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: pr.number,
                  body: `🎉 **Auto-merged!**\n\nThis PR was automatically merged after 2 days with all checks passing.\n\nThank you for your contribution, @${pr.user.login}!\n\n📊 Scoreboards and badges will be updated shortly.`
                });
                
              } catch (error) {
                // Log detailed error information for debugging
                console.log(`PR #${pr.number}: Failed to merge`);
                console.log(`  Error message: ${error.message}`);
                console.log(`  Error status: ${error.status || 'N/A'}`);
                console.log(`  maintainer_can_modify: ${prDetails.maintainer_can_modify}`);
                console.log(`  mergeable_state: ${prDetails.mergeable_state}`);
                console.log(`  mergeable: ${prDetails.mergeable}`);
                console.log(`  head repo: ${pr.head.repo?.full_name || 'N/A'}`);
                console.log(`  base repo: ${pr.base.repo?.full_name || 'N/A'}`);
                if (error.response) {
                  console.log(`  Response status: ${error.response.status}`);
                  console.log(`  Response data: ${JSON.stringify(error.response.data)}`);
                }
                
                // Don't comment on PRs for merge failures - just log them
              }
            }
            
            console.log(`\nAuto-merge complete. Merged ${mergeCount} PR(s) this run.`);
            console.log(`Classic challenges to update: ${Array.from(classicChallenges).join(', ') || 'none'}`);
            console.log(`Package challenges to update: ${Array.from(packageChallenges).join(', ') || 'none'}`);
            
            // Set outputs for subsequent jobs
            core.setOutput('merged_count', mergeCount);
            core.setOutput('classic_challenges', Array.from(classicChallenges).join('\n'));
            core.setOutput('package_challenges', Array.from(packageChallenges).join('\n'));

  update-scoreboards:
    needs: auto-merge
    if: needs.auto-merge.outputs.merged_count > 0 && (needs.auto-merge.outputs.classic_challenges != '' || needs.auto-merge.outputs.package_challenges != '')
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.25.0'

      - name: Update classic challenge scoreboards
        if: needs.auto-merge.outputs.classic_challenges != ''
        run: |
          echo "📊 Updating classic challenge scoreboards..."
          
          # Parse challenges from output
          echo "${{ needs.auto-merge.outputs.classic_challenges }}" > /tmp/classic_challenges.txt
          
          while IFS= read -r challenge_dir; do
            [ -n "$challenge_dir" ] || continue
            echo ""
            echo "========================================"
            echo "📊 Processing $challenge_dir"
            echo "========================================"
            
            # Ensure go.mod exists
            if [ ! -f "$challenge_dir/go.mod" ]; then
              echo "Creating go.mod for $challenge_dir"
              (cd "$challenge_dir" && go mod init "$challenge_dir")
            fi
            
            (cd "$challenge_dir" && go mod tidy 2>/dev/null || true)

            # Initialize scoreboard
            scoreboard="$challenge_dir/SCOREBOARD.md"
            echo "# Scoreboard for $challenge_dir" > "$scoreboard"
            echo "| Username   | Passed Tests | Total Tests |" >> "$scoreboard"
            echo "|------------|--------------|-------------|" >> "$scoreboard"

            # Check if submissions directory exists
            if [ ! -d "$challenge_dir/submissions" ]; then
              echo "⚠️  No submissions directory found for $challenge_dir"
              continue
            fi

            # Run tests for all submissions
            for submission_dir in "$challenge_dir"/submissions/*/; do
              [ -d "$submission_dir" ] || continue

              USERNAME=$(basename "$submission_dir")
              echo "🧪 Testing submission from $USERNAME"

              temp_dir=$(mktemp -d)
              cp "$challenge_dir"/*.go "$temp_dir/" 2>/dev/null || true

              find "$submission_dir" -name "*.go" ! -name "*_test.go" -exec cp {} "$challenge_dir/" \; 2>/dev/null || true

              (cd "$challenge_dir" && timeout 60 go test -v) > "$submission_dir/test_results.txt" 2>&1 || true

              PASS_COUNT=$(grep -c "^[[:space:]]*--- PASS: " "$submission_dir/test_results.txt" 2>/dev/null || echo "0")
              FAIL_COUNT=$(grep -c "^[[:space:]]*--- FAIL: " "$submission_dir/test_results.txt" 2>/dev/null || echo "0")
              
              PASS_COUNT=$(echo "$PASS_COUNT" | tr -d '[:space:]' | grep -o '[0-9]*' | head -1)
              FAIL_COUNT=$(echo "$FAIL_COUNT" | tr -d '[:space:]' | grep -o '[0-9]*' | head -1)
              
              PASS_COUNT=${PASS_COUNT:-0}
              FAIL_COUNT=${FAIL_COUNT:-0}
              
              TOTAL_TESTS=$((PASS_COUNT + FAIL_COUNT))

              if [ "$TOTAL_TESTS" -eq 0 ]; then
                if grep -q "PASS" "$submission_dir/test_results.txt" 2>/dev/null; then
                  TOTAL_TESTS=1
                  PASS_COUNT=1
                elif grep -q "FAIL\|panic\|error" "$submission_dir/test_results.txt" 2>/dev/null; then
                  TOTAL_TESTS=1
                  PASS_COUNT=0
                fi
              fi

              echo "   Results: $PASS_COUNT/$TOTAL_TESTS tests passed"
              echo "| $USERNAME | $PASS_COUNT | $TOTAL_TESTS |" >> "$scoreboard"

              rm -f "$challenge_dir"/*.go
              cp "$temp_dir"/*.go "$challenge_dir/" 2>/dev/null || true
              rm -rf "$temp_dir"
            done

            # Sort scoreboard
            if [ -s "$scoreboard" ] && [ $(wc -l < "$scoreboard") -gt 3 ]; then
              temp_sorted=$(mktemp)
              head -n 3 "$scoreboard" > "$temp_sorted"
              tail -n +4 "$scoreboard" | sort -t '|' -k3,3nr >> "$temp_sorted"
              mv "$temp_sorted" "$scoreboard"
            fi
            
            echo "✅ Completed $challenge_dir"
          done < /tmp/classic_challenges.txt

      - name: Update package challenge scoreboards
        if: needs.auto-merge.outputs.package_challenges != ''
        run: |
          echo "📦 Updating package challenge scoreboards..."
          
          echo "${{ needs.auto-merge.outputs.package_challenges }}" > /tmp/package_challenges.txt
          
          while IFS= read -r challenge_dir; do
            [ -n "$challenge_dir" ] || continue
            echo ""
            echo "========================================"
            echo "📦 Processing $challenge_dir"
            echo "========================================"
            
            PACKAGE_NAME=$(echo "$challenge_dir" | cut -d'/' -f2)
            CHALLENGE_ID=$(echo "$challenge_dir" | cut -d'/' -f3)
            
            if [ ! -f "$challenge_dir/go.mod" ]; then
              echo "Creating go.mod for $challenge_dir"
              (cd "$challenge_dir" && go mod init "$PACKAGE_NAME-$CHALLENGE_ID")
            fi
            
            (cd "$challenge_dir" && go mod tidy 2>/dev/null || true)

            scoreboard="$challenge_dir/SCOREBOARD.md"
            echo "# Scoreboard for $PACKAGE_NAME $CHALLENGE_ID" > "$scoreboard"
            echo "" >> "$scoreboard"
            echo "| Username   | Passed Tests | Total Tests |" >> "$scoreboard"
            echo "|------------|--------------|-------------|" >> "$scoreboard"

            if [ ! -d "$challenge_dir/submissions" ]; then
              echo "⚠️  No submissions directory found for $challenge_dir"
              continue
            fi

            for submission_dir in "$challenge_dir"/submissions/*/; do
              [ -d "$submission_dir" ] || continue

              USERNAME=$(basename "$submission_dir")
              echo "🧪 Testing submission from $USERNAME"

              temp_dir=$(mktemp -d)
              cp "$challenge_dir"/*.go "$temp_dir/" 2>/dev/null || true

              if [ -f "$submission_dir/solution.go" ]; then
                cp "$submission_dir/solution.go" "$challenge_dir/solution-template.go"
              else
                echo "⚠️  No solution.go found for $USERNAME"
                continue
              fi

              (cd "$challenge_dir" && timeout 60 go test -v) > "$submission_dir/test_results.txt" 2>&1 || true

              PASS_COUNT=$(grep -c "^[[:space:]]*--- PASS: " "$submission_dir/test_results.txt" 2>/dev/null || echo "0")
              FAIL_COUNT=$(grep -c "^[[:space:]]*--- FAIL: " "$submission_dir/test_results.txt" 2>/dev/null || echo "0")
              
              PASS_COUNT=$(echo "$PASS_COUNT" | tr -d '[:space:]' | grep -o '[0-9]*' | head -1)
              FAIL_COUNT=$(echo "$FAIL_COUNT" | tr -d '[:space:]' | grep -o '[0-9]*' | head -1)
              
              PASS_COUNT=${PASS_COUNT:-0}
              FAIL_COUNT=${FAIL_COUNT:-0}
              
              TOTAL_TESTS=$((PASS_COUNT + FAIL_COUNT))

              if [ "$TOTAL_TESTS" -eq 0 ]; then
                if grep -q "PASS" "$submission_dir/test_results.txt" 2>/dev/null; then
                  TOTAL_TESTS=1
                  PASS_COUNT=1
                elif grep -q "FAIL\|panic\|error" "$submission_dir/test_results.txt" 2>/dev/null; then
                  TOTAL_TESTS=1
                  PASS_COUNT=0
                fi
              fi

              echo "   Results: $PASS_COUNT/$TOTAL_TESTS tests passed"
              echo "| $USERNAME | $PASS_COUNT | $TOTAL_TESTS |" >> "$scoreboard"

              rm -f "$challenge_dir/solution-template.go"
              cp "$temp_dir"/*.go "$challenge_dir/" 2>/dev/null || true
              rm -rf "$temp_dir"
            done

            if [ -s "$scoreboard" ] && [ $(wc -l < "$scoreboard") -gt 4 ]; then
              temp_sorted=$(mktemp)
              head -n 4 "$scoreboard" > "$temp_sorted"
              tail -n +5 "$scoreboard" | sort -t '|' -k3,3nr >> "$temp_sorted"
              mv "$temp_sorted" "$scoreboard"
            fi
            
            echo "✅ Completed $challenge_dir"
          done < /tmp/package_challenges.txt

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Update main scoreboards
        run: |
          echo "🏆 Generating main scoreboards..."
          
          if [ -n "${{ needs.auto-merge.outputs.classic_challenges }}" ]; then
            echo "Updating classic main scoreboard..."
            python3 scripts/generate_main_scoreboard.py
          fi
          
          if [ -n "${{ needs.auto-merge.outputs.package_challenges }}" ]; then
            echo "Updating package main scoreboard..."
            python3 scripts/generate_package_scoreboard.py
          fi

      - name: Generate profile badges
        run: |
          echo "🏆 Generating profile badges..."
          timeout 300 python3 scripts/generate_contributor_badges.py || {
            echo "⚠️  Badge generation timed out or failed, continuing..."
          }

      - name: Commit and push all changes
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          
          # Add all scoreboard and badge changes
          git add challenge-*/SCOREBOARD.md 2>/dev/null || true
          git add packages/*/challenge-*/SCOREBOARD.md 2>/dev/null || true
          git add README.md 2>/dev/null || true
          git add badges/ 2>/dev/null || true
          
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            CLASSIC="${{ needs.auto-merge.outputs.classic_challenges }}"
            PACKAGE="${{ needs.auto-merge.outputs.package_challenges }}"
            
            git commit -m "📊 Auto-update scoreboards and badges after merge

            Classic challenges: ${CLASSIC:-none}
            Package challenges: ${PACKAGE:-none}
            
            - Updated challenge scoreboards with test results
            - Refreshed main leaderboard in README
            - Regenerated profile badges"
            
            # Robust push with retry logic
            MAX_RETRIES=5
            RETRY_COUNT=0
            
            while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
              echo "Push attempt $((RETRY_COUNT + 1))/$MAX_RETRIES"
              
              git fetch origin main
              
              if ! git diff --quiet HEAD origin/main; then
                echo "Remote has new changes, rebasing..."
                git rebase origin/main || {
                  echo "Rebase failed, trying merge strategy..."
                  git rebase --abort 2>/dev/null || true
                  git merge origin/main -m "Merge remote changes"
                }
              fi
              
              if git push origin main; then
                echo "✅ Successfully pushed changes"
                break
              else
                echo "❌ Push failed, retrying in $((RETRY_COUNT + 1)) seconds..."
                sleep $((RETRY_COUNT + 1))
                RETRY_COUNT=$((RETRY_COUNT + 1))
              fi
            done
            
            if [ $RETRY_COUNT -eq $MAX_RETRIES ]; then
              echo "🚨 Failed to push after $MAX_RETRIES attempts"
              exit 1
            fi
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Summary
        run: |
          echo "## 📊 Auto-merge Scoreboard Update" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**PRs Merged:** ${{ needs.auto-merge.outputs.merged_count }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ -n "${{ needs.auto-merge.outputs.classic_challenges }}" ]; then
            echo "### Classic Challenges Updated" >> $GITHUB_STEP_SUMMARY
            echo "${{ needs.auto-merge.outputs.classic_challenges }}" | while read -r c; do
              [ -n "$c" ] && echo "- $c" >> $GITHUB_STEP_SUMMARY
            done
            echo "" >> $GITHUB_STEP_SUMMARY
          fi
          
          if [ -n "${{ needs.auto-merge.outputs.package_challenges }}" ]; then
            echo "### Package Challenges Updated" >> $GITHUB_STEP_SUMMARY
            echo "${{ needs.auto-merge.outputs.package_challenges }}" | while read -r c; do
              [ -n "$c" ] && echo "- $c" >> $GITHUB_STEP_SUMMARY
            done
            echo "" >> $GITHUB_STEP_SUMMARY
          fi
          
          echo "✅ Scoreboards, main leaderboard, and badges updated!" >> $GITHUB_STEP_SUMMARY
